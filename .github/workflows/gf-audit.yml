name: gf-arithmetic-audit
# RTL differential gate: regenerates the correctly-rounded reference and sweeps
# every GoldenFloat op/format against it (TestFloat-style); also asserts the
# committed src/ multipliers match the correct generator output. See
# verification/run_gf_audit.sh and trinity-clara CLARA-GF-MULTIPLIER-ERRATUM.

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y iverilog python3-numpy
      - name: Run arithmetic gate (mul + add + quantizers)
        run: bash verification/run_gf_audit.sh
      - name: Assert src multipliers match the correct generator
        run: |
          cd verification && python3 gen_gf_mul.py >/dev/null
          fail=0
          for n in 8 12 16 20 24 32 64 128 256; do
            if ! diff -q gf${n}_mul_gen.v ../src/gf${n}_mul.v >/dev/null; then
              echo "::error::src/gf${n}_mul.v diverges from the correct generator output"; fail=1
            fi
          done
          exit $fail
