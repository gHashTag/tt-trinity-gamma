name: RTL & Cocotb Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  iverilog-canonical:
    name: IVerilog canonical anchor test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IVerilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Run canonical anchor test
        run: |
          cd sim
          iverilog -o tb_canonical.out \
            -I../src ../src/*.v tb_canonical.v
          vvp tb_canonical.out

  cocotb-rtl:
    name: Cocotb RTL tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cocotb and IVerilog
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv iverilog
          pip3 install cocotb

      - name: Run Cocotb tests
        run: |
          cd test
          make SIM=icarus

  goldenfloat-arith:
    name: GoldenFloat rung arithmetic cross-check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IVerilog
        run: sudo apt-get update && sudo apt-get install -y iverilog python3

      - name: Cross-check gfN add/mul (probe + exhaustive + value sweeps)
        run: |
          python3 test/gf_arith_xcheck.py   # exponent probe, 8/8 + gf4 skipped
          python3 test/gf4_exhaustive.py    # gf4: all 256 pairs (add+mul)
          python3 test/gf8_exhaustive.py    # gf8: all 65536 pairs (add+mul)
          python3 test/gf_add_sweep.py      # gf8..gf128 add vs exact-rational ref
          python3 test/gf_mul_sweep.py      # gf12..gf128 mul vs exact-rational ref
          python3 test/gf_specials.py       # Inf/NaN/overflow round-trip, all rungs
          python3 test/gf16_v2_verify.py    # corrected gf16_v2 faithful vs exact ref

  yosys-rsi1-audit:
    name: R-SI-1 audit (Yosys)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Run Yosys R-SI-1 audit
        run: |
          yosys -p "read_verilog -I src src/*.v; \
                    hierarchy -top tt_um_trinity_max_true; \
                    proc; opt; stat" | grep '\$mul' || echo "No multipliers found (R-SI-1 compliant)"

  width-defect-gate:
    name: Width/range defect gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator python3

      - name: No new 'field one bit too narrow' defects (value-overflow / out-of-range select)
        run: python3 test/width_gate.py

  vsa-functional:
    name: VSA ternary-matmul functional check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IVerilog
        run: sudo apt-get update && sudo apt-get install -y iverilog python3

      - name: gf16_popcount / gf16_popcount16 ternary inner product (4000 vectors each)
        run: python3 test/gf16_popcount_verify.py

  instantiated-audit:
    name: Instantiated-subsystem conformance audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IVerilog
        run: sudo apt-get update && sudo apt-get install -y iverilog python3

      - name: blake3_anchor RECEIPT signer (shipped == no-XOR model; v2 == real BLAKE3-G)
        run: python3 test/blake3_anchor_verify.py

      - name: blake3_anchor_v3 Wave-5 full-round (7 rounds + permutation == real BLAKE3-G)
        run: python3 test/blake3_anchor_v3_verify.py

      - name: blake3_anchor_v4 full compression (cv/counter/flags == reference compress())
        run: python3 test/blake3_anchor_v4_verify.py

      - name: blake3_hash_chunk single-chunk hash (== official BLAKE3 vectors, <=1024B)
        run: python3 test/blake3_hash_chunk_verify.py

      - name: blake3_hash multi-chunk tree (vs blake3 package, <=4096B)
        run: pip3 install --break-system-packages blake3 2>/dev/null || true; python3 test/blake3_hash_verify.py

      - name: Receipt/identity/nonce path (crc32, lucas_rom, hwrng_lfsr, cassini_post)
        run: python3 test/receipt_path_audit.py

      - name: Control/datapath fabric (router, mesh, multi_tile_receipt)
        run: python3 test/fabric_audit.py

      - name: Instantiated leaf blocks (phi_pll_div, wishbone_full, wb_status_reg, alu9)
        run: python3 test/leaf_audit.py

      - name: Shared neuromorphic/mesh blocks (d2d_holo_mesh, nca, holo_lut_pe, cortex)
        run: python3 test/shared_blocks_audit.py

      - name: Power/sparsity waves (sparse_skip correct; stoch_round defect + v2 unbiased)
        run: python3 test/power_waves_audit.py